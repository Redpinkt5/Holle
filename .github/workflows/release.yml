name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

  pypi:
    name: Publish to PyPI
    needs: test
    if: ${{ !contains(github.ref_name, 'test') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check if version already exists on PyPI
        id: check_pypi
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/project/holle-music/${VERSION}/")
          if [ "$STATUS" = "200" ]; then
            echo "Version ${VERSION} already on PyPI"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not on PyPI"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to PyPI
        if: ${{ steps.check_pypi.outputs.exists == 'false' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  build-binaries:
    name: Build ${{ matrix.name }} binaries
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            targets: hollemusic,hollepet
          - os: ubuntu-latest
            name: linux
            targets: hollemusic
          - os: macos-latest
            name: macos
            targets: hollemusic
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binaries
        shell: bash
        run: python scripts/build-exe.py --targets ${{ matrix.targets }} --platform ${{ matrix.name }}

      - name: Package artifacts
        shell: python
        run: |
          import os
          import shutil
          import tarfile
          import zipfile
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          dist_dir = Path("dist")
          release_dir = Path("release")
          release_dir.mkdir(exist_ok=True)

          platform = "${{ matrix.name }}"
          if platform == "windows":
              shortcut_script = Path("scripts/create-desktop-shortcuts.ps1")
              for name in ["hollemusic.exe", "hollepet.exe"]:
                  src = dist_dir / name
                  if src.exists():
                      # Raw .exe
                      exe_name = f"{name[:-4]}-{version}-windows.exe"
                      shutil.copy2(src, release_dir / exe_name)
                      # Zipped .exe + shortcut script
                      zip_path = release_dir / f"{name[:-4]}-{version}-windows.zip"
                      with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
                          zf.write(src, arcname=name)
                          if shortcut_script.exists():
                              zf.write(shortcut_script, arcname="create-desktop-shortcuts.ps1")
          else:
              src = dist_dir / "hollemusic"
              if src.exists():
                  src.chmod(0o755)
                  suffix = "linux" if platform == "linux" else "macos"
                  tar_path = release_dir / f"hollemusic-{version}-{suffix}.tar.gz"
                  with tarfile.open(tar_path, "w:gz") as tf:
                      tf.add(src, arcname="hollemusic")

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-release
          path: release/*

  release:
    name: Upload to GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
